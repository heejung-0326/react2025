<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자바스크립트 es6문법-객체복사_스프레드연산자</title>
</head>
<body>
  <h2>자바스크립트 es6문법-객체복사_스프레드연산자</h2>
  <p>스프레드 연산자를 사용하면 배열, 문자열, 객체 등 반복 가능한 객체(Iterable Object)를 개별 요소로 분리할 수 있습니다.</p>

  <script>
    //일반변수 - 한번에 하나의 데이터만 저장이 가능
    let a = 10;
    //일반변수 출력
    document.write(a+ '<br>');

    //배열객체 - 한번에 다양한 데이터를 저장이 가능
    let arr1 = [1,2,3,4,5];
    //배열객체 출력
    document.write(arr1+'<br>');
    document.write(arr1[0]+'<br>');
    document.write(arr1[1]+'<br>');

    let arr2 = [...arr1, 6,7,8,9,10]
    document.write(arr2+'<br>');
    document.write(arr2[0]+ '<br>');
    document.write(arr2[1]+ '<br>');
    document.write(arr2[5]+ '<br>');
    document.write(arr2[9]+ '<br>');
    
  </script>
</body>
</html>
